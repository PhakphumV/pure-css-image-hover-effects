<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{EFFECT_NAME}} — Pure CSS Image Hover Effects</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/effect-page.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <a href="../../index.html" class="back-link">← Back to Gallery</a>
    <h1>{{EFFECT_NAME}}</h1>
    <p class="effect-description">{{DESCRIPTION}}</p>
  </header>

  <main class="effect-layout">
    <div class="left-column">
      <!-- Preview Panel -->
      <section class="panel panel--preview">
        <h2>Preview</h2>
        <div class="preview-container">
          <div class="{{EFFECT_ID}}">
            <img src="https://picsum.photos/600/400?random=1" alt="Demo image">
          </div>
        </div>
        <p class="preview-hint">Hover over the image to see the effect</p>
      </section>

      <!-- Credits Panel -->
      <section class="panel panel--credits">
        <h2>Credits</h2>
        <div class="credit-entry">
          <strong>{{CONTRIBUTOR_NAME}}</strong>
          <span class="cred__role">{{CONTRIBUTOR_ROLE}}</span>
          <span class="cred__notes">{{CONTRIBUTOR_NOTES}}</span>
        </div>
      </section>
    </div>

    <div class="right-column">
      <!-- HTML Panel -->
      <section class="panel panel--code">
        <h2>HTML</h2>
        <pre class="code-block"><code></code></pre>
      </section>

      <!-- CSS Panel -->
      <section class="panel panel--code">
        <h2>CSS</h2>
        <pre class="code-block"><code></code></pre>
      </section>
    </div>
  </main>

  <footer class="page-footer">
    <p>MIT License — <a href="https://github.com/PhakphumV/pure-css-image-hover-effects">GitHub</a></p>
  </footer>

  <script src="../../scripts/effect-page.js"></script>
</body>
</html>
